name: AutoRelease 
on:
  push:
    branches:
      - main
    paths:
      - 'manifest.json'

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from manifest.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="v${{ steps.get_version.outputs.VERSION }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and Push Tag
        if: steps.check_tag.outputs.EXISTS == 'false'
        run: |
          TAG="v${{ steps.get_version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Bundle extension
        if: steps.check_tag.outputs.EXISTS == 'false'
        run: |
          mkdir -p dist/scripts
          cp scripts/*.js dist/scripts/
          cp *.json dist/
          cd dist
          
          zip -r ../githubplus-brave-${{ steps.get_version.outputs.VERSION }}.zip .
          zip -r ../githubplus-chrome-${{ steps.get_version.outputs.VERSION }}.zip .
          zip -r ../githubplus-firefox-${{ steps.get_version.outputs.VERSION }}.zip .
          zip -r ../githubplus-opera-${{ steps.get_version.outputs.VERSION }}.zip .

      - name: Create Release
        if: steps.check_tag.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.get_version.outputs.VERSION }}"
          files: |
            githubplus-brave-${{ steps.get_version.outputs.VERSION }}.zip
            githubplus-chrome-${{ steps.get_version.outputs.VERSION }}.zip
            githubplus-firefox-${{ steps.get_version.outputs.VERSION }}.zip
            githubplus-opera-${{ steps.get_version.outputs.VERSION }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}